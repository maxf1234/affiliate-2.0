name: DealsPulse Bot
# Scheduling is handled by an external cron job calling workflow_dispatch —
# GitHub's built-in schedule is intentionally removed so runs aren't doubled.
on:
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd bot && node bot_actions.js
        env:
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
          MAX_DEALS_PER_RUN: '25'
          MIN_DISCOUNT_PCT: '25'
      - run: |
          git config user.name "DealsPulse Bot"
          git config user.email "bot@dealspulse.com"
          git add public/deals.json
          git diff --staged --quiet || git commit -m "bot: update deals"
          git push
      - name: Trigger Vercel redeploy
        run: curl -X POST "https://api.vercel.com/v1/integrations/deploy/prj_ORo4O4shiKWVNnQGO8butlHKugDy/JJwu21OuCu"
