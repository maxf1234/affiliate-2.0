name: DealsPulse Bot
 
on:
  schedule:
    - cron: '*/30 * * * *'  # runs every 30 minutes
  workflow_dispatch:         # allows manual trigger from GitHub Actions tab
 
jobs:
  run-bot:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 python-dotenv twilio
 
      - name: Run deal bot
        env:
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          WHATSAPP_NUMBERS: ${{ secrets.WHATSAPP_NUMBERS }}
          MIN_DISCOUNT_PCT: '20'
          MAX_DEALS_PER_RUN: '10'
          GITHUB_PUSH: 'false'   # GitHub Actions handles the git push below
        run: |
          python bot/bot_actions.py
 
      - name: Commit and push deals.json
        run: |
          git config user.name "DealsPulse Bot"
          git config user.email "bot@dealspulse.com"
          git add public/deals.json
          git diff --staged --quiet || git commit -m "bot: update deals [$(date -u '+%Y-%m-%d %H:%M') UTC]"
          git push
 
